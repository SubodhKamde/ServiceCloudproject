<template>
    <lightning-card title="New Quality Inspection">
        <div class="slds-p-around_medium">
            <lightning-record-edit-form 
                object-api-name="Quality_Inspection__c"
                onsuccess={handleSuccess}>
                
                <lightning-messages></lightning-messages>
                <lightning-input-field field-name="Supplier__c"></lightning-input-field>
                <lightning-input-field field-name="Purchase_Order__c"></lightning-input-field>
                <lightning-input-field field-name="Inspection_Date__c"></lightning-input-field>
                <lightning-input-field field-name="Defect_Rate__c"></lightning-input-field>
                <lightning-input-field field-name="Status__c"></lightning-input-field>
                <lightning-input-field field-name="Notes__c"></lightning-input-field>
                
                <div class="slds-m-top_medium">
                    <lightning-button 
                        type="submit" 
                        variant="brand" 
                        label="Save Inspection">
                    </lightning-button>
                </div>
            </lightning-record-edit-form>
        </div>
    </lightning-card>
</template>
