<template>
    <lightning-card title="Supplier Performance Dashboard">
        <div class="slds-p-around_medium">
            <lightning-input label="Search Supplier" 
                             placeholder="Type a name..." 
                             onchange={handleSearch}>
            </lightning-input>

            <lightning-datatable
                key-field="Id"
                data={filteredSuppliers}
                columns={columns}
                hide-checkbox-column="true">
            </lightning-datatable>
        </div>
    </lightning-card>
</template>
